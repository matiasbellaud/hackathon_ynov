<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechCorp — Assistant Financier IA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

    header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-size: 17px; font-weight: 600; color: #fff; }
    .logo-sub { font-size: 11px; color: #94a3b8; margin-top: 1px; }

    #status-badge { display: flex; align-items: center; gap: 7px; font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid #2d3148; background: #131622; transition: all .3s; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; transition: background .3s; }
    #status-badge.connected #status-dot { background: #22c55e; }
    #status-badge.connected { border-color: #166534; color: #86efac; }
    #status-badge.error #status-dot { background: #ef4444; }
    #status-badge.error { border-color: #7f1d1d; color: #fca5a5; }

    .config-bar { background: #131622; border-bottom: 1px solid #2d3148; padding: 10px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; font-size: 13px; }
    .config-bar label { color: #94a3b8; }
    .config-bar select { background: #1a1d27; border: 1px solid #2d3148; color: #e2e8f0; border-radius: 6px; padding: 5px 10px; font-size: 13px; }
    #connect-btn { background: #4f46e5; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
    #connect-btn:hover { background: #4338ca; }

    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

    .msg { display: flex; gap: 12px; max-width: 820px; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .msg.user .avatar { background: #4f46e5; }
    .msg.assistant .avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }

    .bubble { padding: 12px 16px; border-radius: 14px; line-height: 1.6; font-size: 14px; max-width: 680px; white-space: pre-wrap; word-break: break-word; }
    .msg.user .bubble { background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant .bubble { background: #1a1d27; border: 1px solid #2d3148; color: #e2e8f0; border-bottom-left-radius: 4px; }
    .thinking .bubble { color: #94a3b8; font-style: italic; }

    #welcome { margin: auto; text-align: center; max-width: 460px; }
    #welcome .big-icon { font-size: 48px; margin-bottom: 16px; }
    #welcome h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    #welcome p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
    .sug-btn { background: #1a1d27; border: 1px solid #2d3148; color: #cbd5e1; border-radius: 20px; padding: 7px 14px; font-size: 12px; cursor: pointer; }
    .sug-btn:hover { border-color: #6366f1; color: #a5b4fc; }

    .input-bar { background: #1a1d27; border-top: 1px solid #2d3148; padding: 16px 24px; display: flex; gap: 12px; align-items: flex-end; flex-shrink: 0; }
    #user-input { flex: 1; background: #131622; border: 1px solid #2d3148; color: #e2e8f0; border-radius: 10px; padding: 12px 16px; font-size: 14px; resize: none; line-height: 1.5; min-height: 46px; max-height: 160px; font-family: inherit; }
    #user-input:focus { outline: none; border-color: #4f46e5; }
    #user-input::placeholder { color: #475569; }
    #send-btn { background: #4f46e5; color: #fff; border: none; border-radius: 10px; width: 46px; height: 46px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #send-btn:hover:not(:disabled) { background: #4338ca; }
    #send-btn:disabled { background: #2d3148; cursor: not-allowed; color: #475569; }
    #clear-btn { background: transparent; border: 1px solid #2d3148; color: #64748b; border-radius: 10px; width: 46px; height: 46px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #clear-btn:hover { border-color: #475569; color: #94a3b8; }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💹</div>
    <div>
      <div class="logo-text">TechCorp — Assistant Financier</div>
      <div class="logo-sub">Phi-3.5-Financial · API Flask · Ollama</div>
    </div>
  </div>
  <div id="status-badge">
    <div id="status-dot"></div>
    <span id="status-text">Vérification…</span>
  </div>
</header>

<div class="config-bar">
  <label>Modèle :</label>
  <select id="model-select">
    <option value="phi35-financial">phi35-financial</option>
    <option value="phi3.5">phi3.5</option>
    <option value="qwen2.5:3b">qwen2.5:3b</option>
    <option value="mistral">mistral</option>
  </select>
  <button id="connect-btn" onclick="checkStatus()">Reconnecter</button>
</div>

<div id="chat">
  <div id="welcome">
    <div class="big-icon">📊</div>
    <h2>Assistant Financier TechCorp</h2>
    <p>Posez vos questions sur la finance, les investissements, la comptabilité ou l'économie.</p>
    <div class="suggestions">
      <button class="sug-btn" onclick="sendSuggestion(this)">Qu'est-ce qu'un ratio P/E ?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Explique la diversification de portefeuille</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Comment lire un bilan comptable ?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Différence entre action et obligation</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Qu'est-ce que le WACC ?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Explique le DCF (Discounted Cash Flow)</button>
    </div>
  </div>
</div>

<div class="input-bar">
  <button id="clear-btn" title="Effacer" onclick="clearChat()">🗑️</button>
  <textarea id="user-input" placeholder="Posez votre question financière… (Entrée pour envoyer)" rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
  const chat    = document.getElementById('chat');
  const welcome = document.getElementById('welcome');
  const input   = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const badge   = document.getElementById('status-badge');
  const dot     = document.getElementById('status-dot');
  const statusT = document.getElementById('status-text');

  let messages   = [];
  let streaming  = false;

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Status ──
  async function checkStatus() {
    badge.className = '';
    statusT.textContent = 'Vérification…';
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      if (d.ok) {
        badge.className = 'connected';
        statusT.textContent = `Connecté · ${d.models.length} modèle(s)`;

        const sel = document.getElementById('model-select');
        const cur = sel.value;
        const all = [...new Set([...d.models, 'phi35-financial', 'phi3.5', 'qwen2.5:3b', 'mistral'])];
        sel.innerHTML = all.map(m => `<option value="${m}"${m===cur?' selected':''}>${m}</option>`).join('');
      } else {
        throw new Error(d.error);
      }
    } catch(e) {
      badge.className = 'error';
      statusT.textContent = 'Ollama non disponible';
    }
  }

  // ── DOM helpers ──
  function appendMsg(role, text) {
    if (welcome.parentNode === chat) chat.removeChild(welcome);
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `<div class="avatar">${role==='user'?'👤':'🤖'}</div><div class="bubble"></div>`;
    div.querySelector('.bubble').textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div.querySelector('.bubble');
  }

  function appendThinking() {
    if (welcome.parentNode === chat) chat.removeChild(welcome);
    const div = document.createElement('div');
    div.className = 'msg assistant thinking';
    div.id = 'thinking';
    div.innerHTML = `<div class="avatar">🤖</div><div class="bubble">En train de répondre…</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  // ── Envoi ──
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || streaming) return;

    const model = document.getElementById('model-select').value;
    messages.push({ role: 'user', content: text });
    appendMsg('user', text);
    input.value = '';
    input.style.height = 'auto';
    streaming = true;
    sendBtn.disabled = true;
    appendThinking();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, model })
      });

      document.getElementById('thinking')?.remove();
      const bubble = appendMsg('assistant', '');
      let full = '';

      const reader = res.body.getReader();
      const dec    = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        for (const line of dec.decode(value, { stream: true }).split('\n')) {
          if (!line.trim()) continue;
          try {
            const j = JSON.parse(line);
            if (j.error) { bubble.textContent = '⚠️ ' + j.error; return; }
            if (j.message?.content) {
              full += j.message.content;
              bubble.textContent = full;
              chat.scrollTop = chat.scrollHeight;
            }
          } catch {}
        }
      }
      messages.push({ role: 'assistant', content: full });

    } catch(e) {
      document.getElementById('thinking')?.remove();
      appendMsg('assistant', '⚠️ Erreur réseau : ' + e.message);
    } finally {
      streaming = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function sendSuggestion(btn) { input.value = btn.textContent; sendMessage(); }
  function clearChat() { messages = []; chat.innerHTML = ''; chat.appendChild(welcome); }

  checkStatus();
  setInterval(checkStatus, 30000);
</script>
</body>
</html>
