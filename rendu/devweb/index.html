<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechCorp — Assistant Financier IA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 17px; font-weight: 600; color: #fff; }
    .logo-sub { font-size: 11px; color: #94a3b8; margin-top: 1px; }

    #status-badge {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #2d3148;
      background: #131622;
      transition: all .3s;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #64748b;
      transition: background .3s;
    }
    #status-badge.connected #status-dot { background: #22c55e; }
    #status-badge.connected { border-color: #166534; color: #86efac; }
    #status-badge.error #status-dot { background: #ef4444; }
    #status-badge.error { border-color: #7f1d1d; color: #fca5a5; }

    /* ── Config bar ── */
    .config-bar {
      background: #131622;
      border-bottom: 1px solid #2d3148;
      padding: 10px 24px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
      font-size: 13px;
    }
    .config-bar label { color: #94a3b8; }
    .config-bar input, .config-bar select {
      background: #1a1d27; border: 1px solid #2d3148;
      color: #e2e8f0; border-radius: 6px;
      padding: 5px 10px; font-size: 13px;
    }
    .config-bar input { width: 220px; }
    #connect-btn {
      background: #4f46e5; color: #fff;
      border: none; border-radius: 6px;
      padding: 6px 14px; font-size: 13px;
      cursor: pointer; transition: background .2s;
    }
    #connect-btn:hover { background: #4338ca; }

    /* ── Chat area ── */
    #chat {
      flex: 1; overflow-y: auto;
      padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .msg { display: flex; gap: 12px; max-width: 820px; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 600;
    }
    .msg.user .avatar { background: #4f46e5; }
    .msg.assistant .avatar {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 14px;
      max-width: 680px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: #1a1d27;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .thinking .bubble { color: #94a3b8; font-style: italic; }

    /* ── Welcome card ── */
    #welcome {
      margin: auto;
      text-align: center;
      max-width: 460px;
    }
    #welcome .big-icon { font-size: 48px; margin-bottom: 16px; }
    #welcome h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    #welcome p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
    .sug-btn {
      background: #1a1d27; border: 1px solid #2d3148;
      color: #cbd5e1; border-radius: 20px;
      padding: 7px 14px; font-size: 12px;
      cursor: pointer; transition: all .2s;
    }
    .sug-btn:hover { border-color: #6366f1; color: #a5b4fc; }

    /* ── Input bar ── */
    .input-bar {
      background: #1a1d27;
      border-top: 1px solid #2d3148;
      padding: 16px 24px;
      display: flex; gap: 12px; align-items: flex-end;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      background: #131622; border: 1px solid #2d3148;
      color: #e2e8f0; border-radius: 10px;
      padding: 12px 16px; font-size: 14px;
      resize: none; line-height: 1.5;
      min-height: 46px; max-height: 160px;
      font-family: inherit;
      transition: border-color .2s;
    }
    #user-input:focus { outline: none; border-color: #4f46e5; }
    #user-input::placeholder { color: #475569; }

    #send-btn {
      background: #4f46e5; color: #fff;
      border: none; border-radius: 10px;
      width: 46px; height: 46px;
      cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: #4338ca; }
    #send-btn:disabled { background: #2d3148; cursor: not-allowed; color: #475569; }

    #clear-btn {
      background: transparent; border: 1px solid #2d3148;
      color: #64748b; border-radius: 10px;
      width: 46px; height: 46px;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; flex-shrink: 0;
    }
    #clear-btn:hover { border-color: #475569; color: #94a3b8; }

    /* ── Scrollbar ── */
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💹</div>
    <div>
      <div class="logo-text">TechCorp — Assistant Financier</div>
      <div class="logo-sub">Propulsé par Phi-3.5-Financial via Ollama</div>
    </div>
  </div>
  <div id="status-badge">
    <div id="status-dot"></div>
    <span id="status-text">Vérification…</span>
  </div>
</header>

<div class="config-bar">
  <label>Serveur :</label>
  <input id="api-url" value="http://localhost:11434" />
  <label>Modèle :</label>
  <select id="model-select">
    <option value="phi35-financial">phi35-financial</option>
    <option value="phi3.5">phi3.5</option>
    <option value="qwen2.5:3b">qwen2.5:3b</option>
    <option value="mistral">mistral</option>
  </select>
  <button id="connect-btn" onclick="checkConnection()">Reconnecter</button>
</div>

<div id="chat">
  <div id="welcome">
    <div class="big-icon">📊</div>
    <h2>Assistant Financier TechCorp</h2>
    <p>Posez vos questions sur la finance, les investissements, la comptabilité ou l'économie. Le modèle est spécialisé pour les analystes financiers.</p>
    <div class="suggestions">
      <button class="sug-btn" onclick="sendSuggestion(this)">Qu'est-ce qu'un ratio P/E ?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Explique la diversification de portefeuille</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Comment lire un bilan comptable ?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Différence entre action et obligation</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Qu'est-ce que le WACC ?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Explique le DCF (Discounted Cash Flow)</button>
    </div>
  </div>
</div>

<div class="input-bar">
  <button id="clear-btn" title="Effacer la conversation" onclick="clearChat()">🗑️</button>
  <textarea
    id="user-input"
    placeholder="Posez votre question financière… (Entrée pour envoyer, Shift+Entrée pour saut de ligne)"
    rows="1"
  ></textarea>
  <button id="send-btn" onclick="sendMessage()" title="Envoyer">➤</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const welcome = document.getElementById('welcome');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const statusBadge = document.getElementById('status-badge');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');

  let messages = []; // historique de conversation
  let isStreaming = false;

  // ── Auto-resize textarea ──
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Connexion ──
  async function checkConnection() {
    const url = document.getElementById('api-url').value.trim();
    statusBadge.className = '';
    statusText.textContent = 'Vérification…';
    try {
      const r = await fetch(url + '/api/tags', { signal: AbortSignal.timeout(4000) });
      if (r.ok) {
        const data = await r.json();
        const models = (data.models || []).map(m => m.name);
        statusBadge.className = 'connected';
        statusText.textContent = `Connecté · ${models.length} modèle(s)`;

        // Peupler le select avec les modèles disponibles
        const sel = document.getElementById('model-select');
        const current = sel.value;
        sel.innerHTML = '';
        const allModels = [...new Set([...models, 'phi35-financial', 'phi3.5', 'qwen2.5:3b', 'mistral'])];
        allModels.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m; opt.textContent = m;
          if (m === current) opt.selected = true;
          sel.appendChild(opt);
        });
      } else {
        throw new Error('HTTP ' + r.status);
      }
    } catch (e) {
      statusBadge.className = 'error';
      statusText.textContent = 'Non connecté — lancez Ollama';
    }
  }

  // ── DOM helpers ──
  function appendMsg(role, text) {
    if (welcome.parentNode === chat) chat.removeChild(welcome);

    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const isUser = role === 'user';
    div.innerHTML = `
      <div class="avatar">${isUser ? '👤' : '🤖'}</div>
      <div class="bubble"></div>
    `;
    div.querySelector('.bubble').textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div.querySelector('.bubble');
  }

  function appendThinking() {
    if (welcome.parentNode === chat) chat.removeChild(welcome);
    const div = document.createElement('div');
    div.className = 'msg assistant thinking';
    div.id = 'thinking-indicator';
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">En train de répondre…</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  // ── Envoi ──
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isStreaming) return;

    const url = document.getElementById('api-url').value.trim();
    const model = document.getElementById('model-select').value;

    messages.push({ role: 'user', content: text });
    appendMsg('user', text);
    input.value = '';
    input.style.height = 'auto';

    isStreaming = true;
    sendBtn.disabled = true;

    const thinking = appendThinking();

    try {
      const res = await fetch(url + '/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model, messages, stream: true })
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);

      thinking.remove();
      const bubble = appendMsg('assistant', '');
      let fullText = '';

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split('\n')) {
          if (!line.trim()) continue;
          try {
            const json = JSON.parse(line);
            if (json.message?.content) {
              fullText += json.message.content;
              bubble.textContent = fullText;
              chat.scrollTop = chat.scrollHeight;
            }
          } catch { /* ligne partielle, ignorer */ }
        }
      }

      messages.push({ role: 'assistant', content: fullText });

    } catch (err) {
      thinking.remove();
      appendMsg('assistant', '⚠️ Erreur : ' + err.message + '\n\nVérifiez qu\'Ollama est démarré et que le modèle est chargé.');
      statusBadge.className = 'error';
      statusText.textContent = 'Erreur de connexion';
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function sendSuggestion(btn) {
    input.value = btn.textContent;
    sendMessage();
  }

  function clearChat() {
    messages = [];
    chat.innerHTML = '';
    chat.appendChild(welcome);
  }

  // Vérification au chargement
  checkConnection();
  setInterval(checkConnection, 30000);
</script>
</body>
</html>
